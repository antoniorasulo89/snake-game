<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-gradient: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            --grid-bg: rgba(20, 20, 35, 0.8);
            --snake-head: #00ff88;
            --snake-body: #00cc6a;
            --snake-body-alt: #009950;
            --food-color: #ff3366;
            --food-glow: #ff6b9d;
            --border-color: #2a2a4a;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
        }
        
        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 10px;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 440px;
            padding: 0 10px;
        }
        
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }
        
        .scores {
            display: flex;
            gap: 30px;
        }
        
        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .score-value.current {
            color: var(--accent-cyan);
        }
        
        .score-value.best {
            color: var(--accent-purple);
        }
        
        .game-board-wrapper {
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, var(--border-color), var(--accent-cyan), var(--border-color));
            border-radius: 16px;
            box-shadow: 
                0 0 40px rgba(0, 212, 255, 0.15),
                0 0 80px rgba(168, 85, 247, 0.1),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        .game-board {
            width: clamp(280px, 85vw, 400px);
            height: clamp(280px, 85vw, 400px);
            background: var(--grid-bg);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 5% 5%;
            pointer-events: none;
        }
        
        .cell {
            position: absolute;
            width: 5%;
            height: 5%;
            transition: transform 0.05s ease-out;
        }
        
        .snake-head {
            background: var(--snake-head);
            border-radius: 6px;
            box-shadow: 
                0 0 10px var(--snake-head),
                inset 0 -2px 4px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }
        
        .snake-head::before,
        .snake-head::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #000;
            border-radius: 50%;
            top: 6px;
        }
        
        .snake-head::before {
            left: 4px;
        }
        
        .snake-head::after {
            right: 4px;
        }
        
        .snake-body {
            background: var(--snake-body);
            border-radius: 4px;
            box-shadow: 0 0 6px var(--snake-body);
        }
        
        .snake-body:nth-child(odd) {
            background: var(--snake-body-alt);
        }
        
        .food {
            background: var(--food-color);
            border-radius: 50%;
            box-shadow: 
                0 0 15px var(--food-color),
                0 0 30px var(--food-glow);
            animation: pulse 0.8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 
                    0 0 15px var(--food-color),
                    0 0 30px var(--food-glow);
            }
            50% { 
                transform: scale(1.15);
                box-shadow: 
                    0 0 20px var(--food-color),
                    0 0 40px var(--food-glow);
            }
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-radius: 12px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        
        .overlay-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .overlay-title.start {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .overlay-title.pause {
            color: var(--text-primary);
        }
        
        .overlay-title.gameover {
            color: var(--food-color);
            text-shadow: 0 0 20px var(--food-color);
        }
        
        .overlay-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-align: center;
            max-width: 280px;
            line-height: 1.5;
        }
        
        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.6);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .controls-hint {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .dpad-row {
            display: flex;
            gap: 8px;
        }
        
        .dpad-button {
            width: 60px;
            height: 60px;
            background: var(--grid-bg);
            border: 2px solid var(--accent-cyan);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        .dpad-button:active {
            background: var(--accent-cyan);
            transform: scale(0.92);
        }
        
        .dpad-button svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-cyan);
            transition: fill 0.1s ease;
        }
        
        .dpad-button:active svg {
            fill: #000;
        }
        
        .dpad-center {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pause-mobile-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        
        .pause-mobile-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        }
        
        .pause-mobile-btn svg {
            width: 24px;
            height: 24px;
            fill: #000;
        }
        
        @media (max-width: 768px) {
            .controls-hint {
                display: none;
            }
            
            .mobile-controls {
                display: flex;
            }
            
            .title {
                font-size: clamp(1.2rem, 6vw, 2rem);
            }
            
            .header {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            
            .score-value {
                font-size: clamp(1.2rem, 4vw, 1.5rem);
            }
            
            .game-board-wrapper {
                padding: 3px;
            }
            
            .game-board-wrapper {
                border-radius: 12px;
            }
            
            .dpad-button, .pause-mobile-btn {
                width: clamp(48px, 13vw, 60px);
                height: clamp(48px, 13vw, 60px);
            }
            
            .dpad-center {
                width: clamp(48px, 13vw, 60px);
                height: clamp(48px, 13vw, 60px);
            }
            
            .mobile-controls {
                gap: 6px;
            }
            
            .dpad-row {
                gap: 6px;
            }
        }
        
        .key-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .key {
            background: var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--text-primary);
        }
        
        @media (max-width: 480px) {
            .controls-hint {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">SNAKE</h1>
            <div class="scores">
                <div class="score-box">
                    <span class="score-label">Score</span>
                    <span class="score-value current" id="currentScore">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Best</span>
                    <span class="score-value best" id="bestScore">0</span>
                </div>
            </div>
        </div>
        
        <div class="game-board-wrapper">
            <div class="game-board" id="gameBoard">
                <div class="grid-pattern"></div>
            </div>
            
            <div class="overlay visible" id="startOverlay">
                <h2 class="overlay-title start">SNAKE</h2>
                <p class="overlay-subtitle">Controlla il serpente con i tasti freccia. Mangia il cibo per crescere!</p>
                <button class="btn btn-primary" id="startBtn">Inizia</button>
            </div>
            
            <div class="overlay" id="pauseOverlay">
                <h2 class="overlay-title pause">Pausa</h2>
                <p class="overlay-subtitle">Premi SPAZIO per continuare</p>
            </div>
            
            <div class="overlay" id="gameoverOverlay">
                <h2 class="overlay-title gameover">Game Over</h2>
                <p class="overlay-subtitle" id="gameoverText">Punteggio finale: 0</p>
                <button class="btn btn-primary" id="restartBtn">Ricomincia</button>
            </div>
        </div>
        
        <div class="controls-hint">
            <div class="key-hint">
                <span class="key">↑</span>
                <span class="key">↓</span>
                <span class="key">←</span>
                <span class="key">→</span>
                <span>Movimento</span>
            </div>
            <div class="key-hint">
                <span class="key">SPACE</span>
                <span>Pausa</span>
            </div>
        </div>
        
        <div class="mobile-controls">
            <div class="dpad-row">
                <button class="dpad-button" data-dir="up" aria-label="Su">
                    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
                </button>
            </div>
            <div class="dpad-row">
                <button class="dpad-button" data-dir="left" aria-label="Sinistra">
                    <svg viewBox="0 0 24 24"><path d="M4 12l8-8v5h8v6h-8v5z"/></svg>
                </button>
                <div class="dpad-center">
                    <button class="pause-mobile-btn" id="pauseMobileBtn" aria-label="Pausa">
                        <svg viewBox="0 0 24 24" id="pauseIcon"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
                    </button>
                </div>
                <button class="dpad-button" data-dir="right" aria-label="Destra">
                    <svg viewBox="0 0 24 24"><path d="M20 12l-8 8v-5h-8v-6h8v-5z"/></svg>
                </button>
            </div>
            <div class="dpad-row">
                <button class="dpad-button" data-dir="down" aria-label="Giu">
                    <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-5v-8h-6v8h-5z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const GRID_SIZE = 20;
        const INITIAL_SPEED = 150;
        const SPEED_DECREASE = 5;
        const MIN_SPEED = 50;
        const STORAGE_KEY = 'snake-best-score';

        const gameBoard = document.getElementById('gameBoard');
        const currentScoreEl = document.getElementById('currentScore');
        const bestScoreEl = document.getElementById('bestScore');
        const startOverlay = document.getElementById('startOverlay');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const gameoverOverlay = document.getElementById('gameoverOverlay');
        const gameoverText = document.getElementById('gameoverText');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let bestScore = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
        let gameSpeed = INITIAL_SPEED;
        let gameLoop = null;
        let isPaused = false;
        let isRunning = false;

        bestScoreEl.textContent = bestScore;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = INITIAL_SPEED;
            currentScoreEl.textContent = score;
            spawnFood();
        }

        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                validPosition = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
            renderFood();
        }

        function renderSnake() {
            const existingCells = gameBoard.querySelectorAll('.snake-head, .snake-body');
            existingCells.forEach(cell => cell.remove());

            snake.forEach((segment, index) => {
                const cell = document.createElement('div');
                cell.className = index === 0 ? 'cell snake-head' : 'cell snake-body';
                cell.style.left = `${segment.x * 5}%`;
                cell.style.top = `${segment.y * 5}%`;
                gameBoard.appendChild(cell);
            });
        }

        function renderFood() {
            const existingFood = gameBoard.querySelector('.food');
            if (existingFood) existingFood.remove();

            const foodCell = document.createElement('div');
            foodCell.className = 'cell food';
            foodCell.style.left = `${food.x * 5}%`;
            foodCell.style.top = `${food.y * 5}%`;
            gameBoard.appendChild(foodCell);
        }

        function update() {
            direction = { ...nextDirection };

            const head = { 
                x: snake[0].x + direction.x, 
                y: snake[0].y + direction.y 
            };

            if (head.x < 0) head.x = GRID_SIZE - 1;
            if (head.x >= GRID_SIZE) head.x = 0;
            if (head.y < 0) head.y = GRID_SIZE - 1;
            if (head.y >= GRID_SIZE) head.y = 0;

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                currentScoreEl.textContent = score;
                
                if (score > bestScore) {
                    bestScore = score;
                    bestScoreEl.textContent = bestScore;
                    localStorage.setItem(STORAGE_KEY, bestScore);
                }

                gameSpeed = Math.max(MIN_SPEED, INITIAL_SPEED - Math.floor(score / 50) * SPEED_DECREASE);
                spawnFood();
            } else {
                snake.pop();
            }

            renderSnake();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            gameoverText.textContent = `Punteggio finale: ${score}`;
            gameoverOverlay.classList.add('visible');
        }

        function startGame() {
            initGame();
            renderSnake();
            startOverlay.classList.remove('visible');
            gameoverOverlay.classList.remove('visible');
            pauseOverlay.classList.remove('visible');
            isRunning = true;
            isPaused = false;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                if (!isPaused && isRunning) {
                    update();
                }
            }, gameSpeed);
        }

        function togglePause() {
            if (!isRunning) return;
            
            isPaused = !isPaused;
            if (isPaused) {
                pauseOverlay.classList.add('visible');
            } else {
                pauseOverlay.classList.remove('visible');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === ' ') {
                if (isRunning) {
                    togglePause();
                }
                return;
            }

            if (!isRunning || isPaused) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        document.querySelectorAll('.dpad-button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isRunning || isPaused) return;
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up': if (direction.y !== 1) nextDirection = { x: 0, y: -1 }; break;
                    case 'down': if (direction.y !== -1) nextDirection = { x: 0, y: 1 }; break;
                    case 'left': if (direction.x !== 1) nextDirection = { x: -1, y: 0 }; break;
                    case 'right': if (direction.x !== -1) nextDirection = { x: 1, y: 0 }; break;
                }
            });
        });

        document.getElementById('pauseMobileBtn').addEventListener('click', togglePause);

        initGame();
    </script>
</body>
</html>
